<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRC Search S25U</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .bar { display: flex; gap: 8px; position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; background: #050505; padding: 5px 0; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-size: 16px; outline: none; }
        button { padding: 0 20px; border-radius: 12px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        .p { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .n { font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .copy { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #333; color: #58a6ff; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        #st { text-align: center; color: #666; margin-top: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="bar">
        <input type="text" id="i" placeholder="Search avatar names..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">SCAN</button>
    </div>

    <div id="st">Ready.</div>
    <div class="grid" id="out"></div>

    <script>

            const q = document.getElementById('i').value.trim();
            if(!q) return;
            const out = document.getElementById('out');
            const st = document.getElementById('st');

            st.innerText = "Tunnelling to Database...";
