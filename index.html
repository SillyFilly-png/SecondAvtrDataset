<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRC Search v4</title>
    <style>
        body { background: #0b0e11; color: #adbac7; font-family: -apple-system, blinkmacsystemfont, 'Segoe UI', helvetica, arial, sans-serif; padding: 15px; margin: 0; }
        .bar { display: flex; gap: 8px; position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #444c56; background: #22272e; color: #adbac7; font-size: 16px; outline: none; }
        button { padding: 0 20px; border-radius: 8px; border: none; background: #347d39; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .card { background: #22272e; border-radius: 10px; border: 1px solid #444c56; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        .p { padding: 10px; }
        .n { font-size: 0.8rem; font-weight: 600; margin-bottom: 10px; height: 2.4em; overflow: hidden; }
        .copy { width: 100%; padding: 8px; background: #2d333b; border: 1px solid #444c56; color: #539bf5; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        #st { text-align: center; color: #768390; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="bar">
        <input type="text" id="i" placeholder="Search Avatars..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">SCAN</button>
    </div>

    <div id="st">Ready for Input</div>
    <div class="grid" id="out"></div>

    <script>
        async function run() {
            const i = document.getElementById('i');
            const out = document.getElementById('out');
            const st = document.getElementById('st');
            const q = i.value.trim();
            
            if(!q) return;
            out.innerHTML = "";
            st.innerHTML = "📡 <b>Connecting...</b>";

            try {
                const target = `https://api.avtrdb.com/v2/avatar/search?query=${encodeURIComponent(q)}`;
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
                
                const response = await fetch(proxy);
                if (!response.ok) throw new Error('Proxy Offline');
                
                const wrapper = await response.json();
                if (!wrapper.contents) throw new Error('Empty Response');
                
                const data = JSON.parse(wrapper.contents);
                const results = Array.isArray(data) ? data : (data.results || []);

                if (results.length === 0) {
                    st.innerText = "No avatars found.";
                    return;
                }

                st.innerText = "";
                results.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <img src="${a.thumbnailImageUrl || a.imageUrl || ''}" onerror="this.src='https://placehold.co/200?text=No+Preview'">
                        <div class="p">
                            <div class="n">${a.name || 'Unnamed'}</div>
                            <button class="copy" onclick="cp('${a.id}', this)">COPY ID</button>
                        </div>`;
                    out.appendChild(div);
                });

            } catch (err) {
                st.innerHTML = `<span style="color:#ff6b6b">Error: ${err.message}</span><br><small>Try again in 5 seconds.</small>`;
                console.error(err);
            }
        }

        function cp(id, btn) {
            navigator.clipboard.writeText(id).then(() => {
                const old = btn.innerText;
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = old; }, 1000);
            }).catch(() => {
                alert(id); // Backup if clipboard fails on mobile
            });
        }
    </script>
</body>
</html>
