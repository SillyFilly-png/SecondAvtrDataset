<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRC Search</title>

<style>
body { background:#050505; color:#fff; font-family:sans-serif; padding:15px; }
.wrap { max-width:1100px; margin:auto; }

.input { display:flex; gap:8px; }
input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}
button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#status { margin-top:10px; color:#888; text-align:center; }

.grid {
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}

.card {
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:10px;
}

.card img {
  width:100%;
  border-radius:8px;
}

.name { font-weight:bold; margin:6px 0; font-size:14px; }
.author { font-size:12px; color:#aaa; }

.btns { display:flex; gap:6px; margin-top:6px; }

.small {
  flex:1;
  padding:8px;
  background:#222;
  border:1px solid #444;
  color:#58a6ff;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="wrap">

<div class="input">
  <input id="q" placeholder="Search avatar...">
  <button onclick="search()">Search</button>
</div>

<div id="status">Ready</div>
<div id="results" class="grid"></div>

</div>

<script>
async function search() {
  const q = document.getElementById("q").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");

  if (!q) return;

  status.innerText = "Searching...";
  results.innerHTML = "";

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      status.innerText = "Bad API response";
      console.log("RAW:", text);
      return;
    }

    if (!res.ok) {
      status.innerText = "API error: " + (data.error || "unknown");
      console.log(data);
      return;
    }

    if (!data.length) {
      status.innerText = "No results.";
      return;
    }

    status.innerText = "";

    data.forEach(a => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${a.image}">
        <div class="name">${a.name}</div>
        <div class="author">${a.author}</div>
        <div class="btns">
          <button class="small" onclick="copy('${a.id}', this)">COPY</button>
        </div>
      `;

      results.appendChild(div);
    });

  } catch (e) {
    status.innerText = "Fetch failed";
    console.log(e);
  }
}

function copy(id, btn) {
  navigator.clipboard.writeText(id);
  btn.innerText = "DONE";
  setTimeout(()=>btn.innerText="COPY",1000);
}
</script>

</body>
</html>
