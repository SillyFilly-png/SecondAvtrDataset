<script>
    async function go() {
        const q = document.getElementById('i').value.trim();
        const st = document.getElementById('st');
        const out = document.getElementById('out');
        if(!q) return;

        st.innerText = "Connecting to 2026 VRC Index...";
        out.innerHTML = "";

        // This uses AllOrigins to wrap the request and hide it from CORS blocks
        const api = `https://api.avtrdb.com/v2/avatar/search?query=${encodeURIComponent(q)}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(api)}`;

        try {
            const r = await fetch(proxyUrl);
            const wrapper = await r.json();
            const data = JSON.parse(wrapper.contents); // AllOrigins wraps data in a 'contents' string

            const results = Array.isArray(data) ? data : (data.results || []);

            if (results.length === 0) {
                st.innerText = "No avatars found for that name.";
                return;
            }

            st.innerText = "";
            results.forEach(a => {
                const el = document.createElement('div');
                el.className = 'card';
                el.innerHTML = `
                    <img src="${a.thumbnailImageUrl || a.imageUrl || ''}" onerror="this.src='https://placehold.co/200?text=No+Image'">
                    <div style="padding:10px;">
                        <div style="font-size:12px; font-weight:bold; margin-bottom:5px; overflow:hidden;">${a.name}</div>
                        <button class="copy" onclick="cp('${a.id}', this)" style="width:100%; padding:8px; background:#222; color:#58a6ff; border:1px solid #333; border-radius:6px; font-size:11px;">COPY ID</button>
                    </div>`;
                out.appendChild(el);
            });
        } catch (e) {
            st.innerText = "Search Failed. Database is currently rate-limited.";
            console.error(e);
        }
    }

    function cp(id, b) {
        navigator.clipboard.writeText(id).then(() => {
            const old = b.innerText;
            b.innerText = "COPIED!";
            setTimeout(() => b.innerText = old, 1000);
        });
    }
</script>
