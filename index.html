<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRC Search</title>

<style>
body {
  background:#050505;
  color:#fff;
  font-family:sans-serif;
  padding:15px;
}

.input-wrap {
  display:flex;
  gap:8px;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

button {
  padding:12px;
  background:#007bff;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#status {
  margin-top:15px;
  text-align:center;
  color:#888;
}

.grid {
  margin-top:15px;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap:12px;
}

.card {
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:10px;
}

.card img {
  width:100%;
  border-radius:8px;
}

.name {
  font-size:13px;
  font-weight:bold;
  margin:8px 0;
}

.copy {
  width:100%;
  padding:8px;
  background:#222;
  border:1px solid #444;
  color:#58a6ff;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="input-wrap">
  <input id="q" placeholder="Search avatar...">
  <button onclick="search()">Search</button>
</div>

<div id="status">Ready</div>
<div id="results" class="grid"></div>

<script>
async function search() {
  const q = document.getElementById("q").value;
  const status = document.getElementById("status");
  const results = document.getElementById("results");

  if (!q) return;

  status.innerText = "Searching...";
  results.innerHTML = "";

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (!data.length) {
      status.innerText = "No results.";
      return;
    }

    status.innerText = "";

    data.forEach(a => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${a.image || ""}">
        <div class="name">${a.name}</div>
        <button class="copy" onclick="copyID('${a.id}', this)">COPY ID</button>
      `;

      results.appendChild(div);
    });

  } catch (err) {
    status.innerText = "Error loading data.";
  }
}

function copyID(id, btn) {
  navigator.clipboard.writeText(id);
  btn.innerText = "COPIED!";
  setTimeout(() => btn.innerText = "COPY ID", 1000);
}
</script>

</body>
</html>
