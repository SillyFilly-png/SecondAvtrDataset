<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRC Search S25U</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .bar { display: flex; gap: 8px; position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-size: 16px; outline: none; }
        button { padding: 0 20px; border-radius: 12px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .unlock { background: #ff4757; width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; font-size: 13px; text-align: center; }
        .unlock a { color: #fff; font-weight: bold; text-decoration: underline; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: #111; border-radius: 15px; border: 1px solid #222; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        .p { padding: 10px; }
        .n { font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .copy { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #007bff; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        #st { text-align: center; color: #555; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="unlock" id="unl">
        ⚠️ FIRST TIME? <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank">CLICK HERE</a> and press "Request temporary access" to unlock the database on your phone.
    </div>

    <div class="bar">
        <input type="text" id="i" placeholder="Avatar name..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">SEARCH</button>
    </div>

    <div id="st">Ready to hunt.</div>
    <div class="grid" id="out"></div>

    <script>
        async function run() {
            const q = document.getElementById('i').value.trim();
            if(!q) return;
            const out = document.getElementById('out');
            const st = document.getElementById('st');
            out.innerHTML = "";
            st.innerText = "Tunnelling through blocks...";

            // This is the magic proxy + the database
            const proxy = "https://cors-anywhere.herokuapp.com/";
            const target = `https://api.avtrdb.com/v2/avatar/search?query=${encodeURIComponent(q)}`;

            try {
                const r = await fetch(proxy + target, {
                    headers: {
                        "X-Requested-With": "XMLHttpRequest",
                        "User-Agent": "VRCX/2026.02.11" // Bypasses the 403 blocks
                    }
                });

                if (r.status === 403) {
                    st.innerText = "Access denied. Did you click the red 'Unlock' link at the top?";
                    return;
                }

                const data = await r.json();
                const results = Array.isArray(data) ? data : (data.results || []);

                if (results.length === 0) {
                    st.innerText = "No avatars found.";
                    return;
                }

                st.innerText = "";
                results.forEach(a => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <img src="${a.thumbnailImageUrl || a.imageUrl || ''}" onerror="this.src='https://placehold.co/300x300?text=No+Preview'">
                        <div class="p">
                            <div class="n">${a.name}</div>
                            <button class="copy" onclick="cp('${a.id}', this)">COPY ID</button>
                        </div>`;
                    out.appendChild(el);
                });

            } catch (err) {
                st.innerText = "Connection failed. Check your internet or the proxy.";
            }
        }

        function cp(id, btn) {
            navigator.clipboard.writeText(id).then(() => {
                const old = btn.innerText;
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = old; }, 1000);
            });
        }
    </script>
</body>
</html>
